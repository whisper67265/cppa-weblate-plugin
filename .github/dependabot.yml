#
# Dependabot version updates (opens PRs). Also enable in the repo UI:
# Settings → Code security → Dependabot alerts / Dependabot security updates.
# https://docs.astral.sh/uv/guides/integration/dependabot/

version: 2

updates:
  # pyproject.toml + uv.lock (this project uses uv, not requirements.txt).
- package-ecosystem: uv
  directory: /
  schedule:
    # 09:00 Monday Etc/UTC via cron (unquoted time: 09:00 is invalid for Dependabot).
    interval: cron
    cronjob: 0 9 * * 1
    timezone: Etc/UTC
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - python
  # Direct deps only (packaging, Weblate[all]). Transitive lockfile entries are
  # pinned by Weblate and updated via weblate-pin-bump, not independently.
  allow:
  - dependency-type: direct
  groups:
    uv-patch-minor:
      update-types:
      - patch
      - minor
    uv-major:
      update-types:
      - major

  # Pinned third-party actions under .github/workflows/
- package-ecosystem: github-actions
  directory: /
  schedule:
    # 09:00 Monday Etc/UTC via cron (unquoted time: 09:00 is invalid for Dependabot).
    interval: cron
    cronjob: 0 9 * * 1
    timezone: Etc/UTC
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  groups:
    actions:
      patterns:
      - '*'

  # Hook repos + revs in .pre-commit-config.yaml
- package-ecosystem: pre-commit
  directory: /
  schedule:
    # 09:00 Monday Etc/UTC via cron (unquoted time: 09:00 is invalid for Dependabot).
    interval: cron
    cronjob: 0 9 * * 1
    timezone: Etc/UTC
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - pre-commit
  groups:
    pre-commit-hooks:
      patterns:
      - '*'
