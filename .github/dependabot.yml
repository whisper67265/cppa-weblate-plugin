#
# Dependabot version updates (opens PRs). Also enable in the repo UI:
# Settings → Code security → Dependabot alerts / Dependabot security updates.
# https://docs.astral.sh/uv/guides/integration/dependabot/
#
# uv: direct deps in pyproject.toml / dependency-groups; uv refreshes uv.lock.
# allow: direct avoids PRs that only bump Weblate transitives (e.g. Django).
# Weblate is bumped by weblate-pin-bump.yml, not Dependabot.

version: 2

updates:
- package-ecosystem: uv
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: Etc/UTC
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - python
  allow:
  - dependency-type: direct
  ignore:
  - dependency-name: Weblate
  - dependency-name: weblate
  groups:
    dev-patch-minor:
      patterns:
      - coverage*
      - prek
      - pytest*
      update-types:
      - patch
      - minor
    dev-major:
      patterns:
      - coverage*
      - prek
      - pytest*
      update-types:
      - major

# Pinned third-party actions under .github/workflows/
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: Etc/UTC
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  groups:
    actions:
      patterns:
      - '*'

# Hook repos + revs in .pre-commit-config.yaml
- package-ecosystem: pre-commit
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: "09:00"
    timezone: Etc/UTC
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - pre-commit
  groups:
    pre-commit-hooks:
      patterns:
      - '*'
