name: Weblate pin sync

on:
  workflow_call:

permissions:
  contents: read

jobs:
  weblate-pin-sync:
    name: Weblate pin sync
    runs-on: ubuntu-latest
    steps:
    # actions/checkout v6.0.2
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Check PyPI and Docker Weblate pins
      run: bash scripts/check-weblate-pin-sync.sh
