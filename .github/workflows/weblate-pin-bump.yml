name: Weblate pin bump

on:
  schedule:
  - cron: 0 9 * * 1
  workflow_dispatch:
    inputs:
      version:
        description: PyPI Weblate calver to pin (optional; default picks newest)
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  contract-latest:
    name: Weblate upstream contract (latest PyPI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    # actions/checkout v6.0.2
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    # astral-sh/setup-uv v8.1.0
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        version: 0.11.12
    - name: Install apt dependencies (Weblate venv)
      run: sudo ./.github/ci/apt-install
    - name: Install plugin dependencies
      run: uv sync --frozen --group dev
    - name: Verify Weblate internal API contracts (latest PyPI)
      run: bash scripts/check-weblate-internal-contract.sh --latest

  bump-weblate-pin:
    needs: [contract-latest]
    name: Bump Weblate pin
    runs-on: ubuntu-latest
    steps:
    # actions/checkout v6.0.2
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
    # astral-sh/setup-uv v8.1.0
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        version: 0.11.12
    - name: Install apt dependencies (Weblate venv)
      run: sudo ./.github/ci/apt-install
    - name: Resolve and apply Weblate bump
      id: bump
      env:
        VERSION_INPUT: ${{ inputs.version }}
      run: |
        set -euo pipefail
        args=(--apply)
        if [[ -n "${VERSION_INPUT}" ]]; then
          args+=(--version "${VERSION_INPUT}")
        fi
        bash scripts/bump-weblate-version.sh "${args[@]}"
    - name: Open pull request
      if: steps.bump.outputs.changed == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        TARGET_PYPI: ${{ steps.bump.outputs.target_pypi }}
        TARGET_DOCKER: ${{ steps.bump.outputs.target_docker }}
      run: |
        set -euo pipefail
        target_pypi="${TARGET_PYPI}"
        target_docker="${TARGET_DOCKER}"
        branch="weblate-pin/${target_pypi}"
        bump_files=(pyproject.toml docker/Dockerfile.weblate-plugin uv.lock)

        git fetch origin

        head_ref="${GITHUB_REPOSITORY_OWNER}:${branch}"
        open_count="$(gh pr list --head "${head_ref}" --state open --json number --jq 'length')"
        if [[ "$open_count" != "0" ]]; then
          echo "Open PR already exists for branch ${branch}"
          exit 0
        fi

        remote_exists=false
        if git ls-remote --exit-code --heads origin "${branch}" | grep -q .; then
          remote_exists=true
        fi

        pr_body="$(printf '%s\n' \
          '## Summary' \
          '' \
          "Automated Weblate pin bump (PyPI + Docker base image + \`uv.lock\`)." \
          '' \
          '| | Version |' \
          '|---|---------|' \
          "| PyPI (\`pyproject.toml\`) | \`${target_pypi}\` |" \
          "| Docker (\`Dockerfile.weblate-plugin\`) | \`weblate/weblate:${target_docker}\` |" \
          '' \
          'Docker tag follows Weblate fixed production format' \
          "\`YEAR.MONTH.PATCH.BUILD\` (see Releasing Weblate docs)." \
          '' \
          '## Test plan' \
          '' \
          '- [ ] CI passes (including Weblate pin sync check)' \
          '- [ ] Plugin smoke / functional tests against new Weblate stack')"

        ensure_labels() {
          gh label create dependencies --color "0366d6" --description "Dependency updates" 2>/dev/null || true
          gh label create weblate --color "1d76db" --description "Weblate version pinning" 2>/dev/null || true
        }

        create_pr() {
          ensure_labels
          gh pr create \
            --title "chore(deps): bump Weblate pin to ${target_pypi}" \
            --base develop \
            --head "${branch}" \
            --label dependencies \
            --label weblate \
            --body "${pr_body}"
        }

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        bump_files_match_remote=false
        if [[ "$remote_exists" == true ]]; then
          git fetch origin "refs/heads/${branch}:refs/remotes/origin/${branch}" 2>/dev/null \
            || git fetch origin "${branch}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
            if git diff --quiet "origin/${branch}" -- "${bump_files[@]}"; then
              bump_files_match_remote=true
              echo "Remote branch ${branch} already matches bump files"
            else
              echo "Remote branch ${branch} differs from bump files; reconciling"
            fi
          fi
        fi

        if [[ "$bump_files_match_remote" != true ]]; then
          git checkout -B "${branch}"
          git add "${bump_files[@]}"
          if ! git diff --cached --quiet; then
            git commit \
              -m "chore(deps): bump Weblate pin to ${target_pypi}" \
              -m "PyPI Weblate[postgres]==${target_pypi}" \
              -m "Docker weblate/weblate:${target_docker}"
          fi

          if [[ "$remote_exists" == true ]]; then
            git push --force-with-lease=refs/heads/"${branch}":refs/remotes/origin/"${branch}" origin "${branch}"
          elif ! git push -u origin "${branch}"; then
            echo "Push failed; checking whether remote branch can be reconciled"
            git fetch origin "refs/heads/${branch}:refs/remotes/origin/${branch}" 2>/dev/null \
              || git fetch origin "${branch}" || true
            if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              if git diff --quiet "origin/${branch}" -- "${bump_files[@]}"; then
                echo "Remote branch ${branch} already matches bump files after push failure"
              else
                git push --force-with-lease=refs/heads/"${branch}":refs/remotes/origin/"${branch}" origin "${branch}"
              fi
            else
              exit 1
            fi
          fi
        fi

        create_pr
