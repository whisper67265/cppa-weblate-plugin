name: Weblate pin bump

on:
  schedule:
  - cron: 0 9 * * 1
  workflow_dispatch:
    inputs:
      version:
        description: PyPI Weblate calver to pin (optional; default picks newest)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-weblate-pin:
    name: Bump Weblate pin
    runs-on: ubuntu-latest
    steps:
    # actions/checkout v6.0.2
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    # astral-sh/setup-uv v8.1.0
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: 0.11.12
    - name: Resolve and apply Weblate bump
      id: bump
      env:
        VERSION_INPUT: ${{ inputs.version }}
      run: |
        set -euo pipefail
        args=(--apply)
        if [[ -n "${VERSION_INPUT}" ]]; then
          args+=(--version "${VERSION_INPUT}")
        fi
        bash scripts/bump-weblate-version.sh "${args[@]}"
    - name: Open pull request
      if: steps.bump.outputs.changed == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        TARGET_PYPI: ${{ steps.bump.outputs.target_pypi }}
        TARGET_DOCKER: ${{ steps.bump.outputs.target_docker }}
      run: |
        set -euo pipefail
        target_pypi="${TARGET_PYPI}"
        target_docker="${TARGET_DOCKER}"
        branch="weblate-pin/${target_pypi}"

        existing="$(gh pr list --head "${branch}" --state open --json number --jq 'length')"
        if [[ "$existing" != "0" ]]; then
          echo "Open PR already exists for branch ${branch}"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b "${branch}"
        git add pyproject.toml docker/Dockerfile.weblate-plugin uv.lock
        git commit \
          -m "chore(deps): bump Weblate pin to ${target_pypi}" \
          -m "PyPI Weblate[all]==${target_pypi}" \
          -m "Docker weblate/weblate:${target_docker}"
        git push -u origin "${branch}"
        pr_body="$(printf '%s\n' \
          '## Summary' \
          '' \
          "Automated Weblate pin bump (PyPI + Docker base image + \`uv.lock\`)." \
          '' \
          '| | Version |' \
          '|---|---------|' \
          "| PyPI (\`pyproject.toml\`) | \`${target_pypi}\` |" \
          "| Docker (\`Dockerfile.weblate-plugin\`) | \`weblate/weblate:${target_docker}\` |" \
          '' \
          'Docker tag follows Weblate fixed production format' \
          "\`YEAR.MONTH.PATCH.BUILD\` (see Releasing Weblate docs)." \
          '' \
          '## Test plan' \
          '' \
          '- [ ] CI passes (including Weblate pin sync check)' \
          '- [ ] Plugin smoke / functional tests against new Weblate stack')"
        gh pr create \
          --title "chore(deps): bump Weblate pin to ${target_pypi}" \
          --base develop \
          --label dependencies \
          --label weblate \
          --body "${pr_body}"
